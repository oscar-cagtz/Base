# .github/workflows/deploy.yml
# Fold Group automated deployment to GitHub Pages.
# Architecture: Frontend nested inside /web-app directory

name: Deploy Fold Brand Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./web-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Sever Phantom Workspace Links
        # ARCHITECT NOTE: This stops NPM from looking up the directory tree and 
        # finding the old v4 lockfiles you accidentally generated at the root earlier.
        run: rm -rf ../package.json ../package-lock.json ../node_modules
          
      - name: Install Dependencies
        run: npm install
        
      - name: Force Tailwind v3 Core (The Hammer)
        # ARCHITECT NOTE: Explicitly forces the exact versions right before the build.
        # This overrides absolutely any ghost cache or workspace conflicts.
        run: npm install tailwindcss@3.4.19 postcss autoprefixer --no-save
        
      - name: Build Application
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web-app/dist'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4