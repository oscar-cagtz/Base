# .github/workflows/deploy.yml
# Fold Group automated deployment to GitHub Pages.
# Architecture: Frontend nested inside /web-app directory

name: Deploy Fold Brand Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    # 1. KEY CHANGE: Tells all 'run' steps to execute inside the web-app folder
    defaults:
      run:
        working-directory: ./web-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web-app/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Application
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      # 2. KEY CHANGE: Point the artifact uploader to the nested dist folder
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web-app/dist'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4