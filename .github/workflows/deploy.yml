# .github/workflows/deploy.yml
# Fold Group automated deployment to GitHub Pages.
# Architecture: Frontend nested inside /web-app directory

name: Deploy Fold Brand Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./web-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # ARCHITECT NOTE: We have intentionally removed the cache-dependency-path 
          # here to break the ghost cache and force a clean dependency resolution.
          
      - name: Install Dependencies
        # ARCHITECT NOTE: Switching from `npm ci` to `npm install`. 
        # This forces the CI server to read your package.json directly and install 
        # the exact v3.4.19 you specified, ignoring any stale lockfiles stuck in Git.
        run: npm install
        
      - name: Build Application
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web-app/dist'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4